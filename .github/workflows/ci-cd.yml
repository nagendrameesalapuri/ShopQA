name: ShopQA CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  POSTGRES_DB:       shopqa_test
  POSTGRES_USER:     shopqa_user
  POSTGRES_PASSWORD: shopqa_pass

jobs:
  # ═══════════════════════════════════════════════
  # JOB 1: Lint & Type Check
  # ═══════════════════════════════════════════════
  lint:
    name: 🔍 Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        run: cd backend && npm ci

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Lint backend
        run: cd backend && npx eslint src/ --ext .js --max-warnings 0 || true

      - name: Lint frontend
        run: cd frontend && npx eslint src/ --ext .jsx,.js --max-warnings 0 || true

  # ═══════════════════════════════════════════════
  # JOB 2: Backend API Tests
  # ═══════════════════════════════════════════════
  api-tests:
    name: 🧪 API Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       ${{ env.POSTGRES_DB }}
          POSTGRES_USER:     ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run API tests
        run: cd backend && npm test -- --coverage --forceExit
        env:
          NODE_ENV:        test
          DB_HOST:         localhost
          DB_PORT:         5432
          DB_NAME:         ${{ env.POSTGRES_DB }}
          DB_USER:         ${{ env.POSTGRES_USER }}
          DB_PASSWORD:     ${{ env.POSTGRES_PASSWORD }}
          JWT_SECRET:      test_jwt_secret_key_ci
          JWT_REFRESH:     test_refresh_secret_key_ci
          PORT:            5000

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
          flags: api
        if: always()

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: backend/coverage/

  # ═══════════════════════════════════════════════
  # JOB 3: Build Frontend
  # ═══════════════════════════════════════════════
  build-frontend:
    name: 🏗 Build Frontend
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          CI: false
          REACT_APP_API_URL: /api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

  # ═══════════════════════════════════════════════
  # JOB 4: E2E Tests (Playwright)
  # ═══════════════════════════════════════════════
  e2e-tests:
    name: 🎭 E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [api-tests, build-frontend]
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       ${{ env.POSTGRES_DB }}
          POSTGRES_USER:     ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install all dependencies
        run: |
          cd backend  && npm ci
          cd ../frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Start backend server
        run: |
          cd backend
          npm start &
          sleep 8
        env:
          NODE_ENV:        test
          DB_HOST:         localhost
          DB_NAME:         ${{ env.POSTGRES_DB }}
          DB_USER:         ${{ env.POSTGRES_USER }}
          DB_PASSWORD:     ${{ env.POSTGRES_PASSWORD }}
          JWT_SECRET:      test_secret
          JWT_REFRESH:     test_refresh
          PORT:            5000

      - name: Seed test database
        run: |
          curl -X POST http://localhost:5000/api/qa/seed
        continue-on-error: true

      - name: Start frontend
        run: |
          cd frontend
          npx serve -s build -p 3000 &
          sleep 5

      - name: Run Playwright tests
        run: cd frontend && npx playwright test --reporter=html,list
        env:
          BASE_URL: http://localhost:3000
          API_URL:  http://localhost:5000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/

  # ═══════════════════════════════════════════════
  # JOB 5: Security Scan
  # ═══════════════════════════════════════════════
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit backend dependencies
        run: cd backend && npm audit --audit-level=high || true

      - name: Audit frontend dependencies
        run: cd frontend && npm audit --audit-level=high || true

      - name: Run OWASP dependency check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: shopqa
          path: .
          format: HTML
        continue-on-error: true

  # ═══════════════════════════════════════════════
  # JOB 6: Build & Push Docker Image
  # ═══════════════════════════════════════════════
  docker:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: [api-tests, e2e-tests]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        if: github.event_name != 'pull_request'

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/shopqa-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/shopqa-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/shopqa-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/shopqa-frontend:${{ github.sha }}

  # ═══════════════════════════════════════════════
  # JOB 7: Deployment (main branch only)
  # ═══════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Deploy to staging server
        run: |
          echo "Deploying ShopQA v${{ github.sha }} to staging..."
          # In production: SSH to server and pull latest Docker images
          # ssh deployer@staging.shopqa.com "cd /app && docker-compose pull && docker-compose up -d"
          echo "✅ Deployment complete"

      - name: Run smoke tests on staging
        run: |
          sleep 15
          curl -f https://staging.shopqa.com/health || echo "Health check failed"

      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "✅ ShopQA deployed to staging: ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        if: always()
