version: '3.9'

services:
  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: shopqa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       shopqa
      POSTGRES_USER:     shopqa_user
      POSTGRES_PASSWORD: shopqa_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopqa_user -d shopqa"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopqa_backend
    restart: unless-stopped
    environment:
      NODE_ENV:        development
      PORT:            5000
      DB_HOST:         postgres
      DB_PORT:         5432
      DB_NAME:         shopqa
      DB_USER:         shopqa_user
      DB_PASSWORD:     shopqa_pass
      JWT_SECRET:      shopqa_dev_jwt_secret_change_in_prod
      JWT_REFRESH:     shopqa_dev_refresh_secret_change_in_prod
      JWT_EXPIRES:     15m
      FRONTEND_URL:    http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npm", "run", "dev"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shopqa_frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL:    http://localhost:5000/api
      CHOKIDAR_USEPOLLING:  "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: shopqa_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    profiles: ["production"]

  # ── Playwright Test Runner ────────────────────────────────────────────────────
  playwright:
    image: mcr.microsoft.com/playwright:v1.39.0-focal
    container_name: shopqa_playwright
    working_dir: /tests
    volumes:
      - ./tests:/tests
      - playwright_results:/tests/results
    environment:
      BASE_URL: http://frontend:3000
      API_URL:  http://backend:5000
    depends_on:
      - frontend
      - backend
    command: npx playwright test --reporter=html
    profiles: ["testing"]

volumes:
  postgres_data:
  uploads_data:
  playwright_results:
